version: '3.8'

services:
  db:
    image: postgres:15
    container_name: hermes_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      tz: "America/Manaus"
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql
  redis:
    image: redis:alpine
    container_name: hermes_redis
    restart: always
    ports:
      - "${REDIS_PORT}:6379"
